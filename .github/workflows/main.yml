name: Drift Resolver CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  drift-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r drift_resolver/requirements.txt

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for postgres..."
          for i in {1..10}; do
            PGPASSWORD=testpass psql -h localhost -U testuser -d testdb \
              -c 'SELECT 1;' && echo "PostgreSQL ready." && break
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

      - name: Show migrations that will be applied
        run: |
          echo "=== Migrations in repo ==="
          ls -la prisma/migrations/
          echo "=== schema.prisma ==="
          cat prisma/schema.prisma

      - name: Apply baseline Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Confirm migration status
        run: npx prisma migrate status
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Confirm User table exists
        run: |
          echo "=== User table structure ==="
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb \
            -c '\d "User"'
        continue-on-error: true

      - name: Simulate safe drift — add nullable column
        run: |
          echo "Introducing safe drift: adding nullable column bio..."
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb \
            -c 'ALTER TABLE "User" ADD COLUMN "bio" TEXT;'
          echo "Drift introduced successfully."

      - name: Confirm drift exists before running tool
        run: |
          echo "=== User table AFTER drift (bio column should appear) ==="
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb \
            -c '\d "User"'
          echo "=== Running prisma migrate diff to confirm drift ==="
          npx prisma migrate diff \
            --from-url "postgresql://testuser:testpass@localhost:5432/testdb" \
            --to-schema-datamodel ./prisma/schema.prisma \
            --script || true
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Run drift-resolver layer
        run: |
          python drift_resolver/main.py \
            --schema ./prisma/schema.prisma \
            --db-url "postgresql://testuser:testpass@localhost:5432/testdb"
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTO_APPROVE: 'true'

      - name: Confirm drift was resolved
        if: success()
        run: |
          echo "=== Migration status after resolution ==="
          npx prisma migrate status
          echo ""
          echo "=== Last 5 entries in _prisma_migrations ==="
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb \
            -c 'SELECT migration_name, finished_at FROM "_prisma_migrations" ORDER BY finished_at DESC LIMIT 5;'
          echo ""
          echo "=== User table structure after resolution ==="
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb \
            -c '\d "User"'
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Show drift report summary
        if: always()
        run: |
          echo "=== drift-report.json ==="
          cat drift-report.json 2>/dev/null || echo "No report generated."

      - name: Clean up generated drift migrations
        if: always()
        run: |
          echo "Removing generated drift migrations from workspace..."
          rm -rf prisma/migrations/*_drift_auto_resolve
          echo "Remaining migrations:"
          ls prisma/migrations/

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: |
            drift-report.json
            drift-report.html